name: Verify plugin

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - name: Install Python deps
        run: pip install pyyaml 'reuse==5.1.1'
      - name: Run verification gates
        run: bash scripts/run-all-gates.sh
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin + marketplace manifests (strict)
        env:
          DISABLE_AUTOUPDATER: '1'
        run: claude plugin validate . --strict
      - name: REUSE license-metadata compliance
        run: reuse lint
      - name: Doc count guard (README agent count matches agents/*.md)
        # Single source of truth = the filesystem. If an agent is added or
        # removed without updating the "NN shared agents" claim in README.md,
        # this fails loudly instead of letting the count drift silently.
        run: |
          set -euo pipefail
          AGENTS=$(find agents -maxdepth 1 -name '*.md' | wc -l | tr -d ' ')
          if ! grep -q "${AGENTS} shared agents" README.md; then
            echo "::error::README.md does not state '${AGENTS} shared agents' but agents/ has ${AGENTS} *.md files — update the count."
            exit 1
          fi
          echo "agent count in sync: ${AGENTS}"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: gitleaks (full git history)
        run: |
          version=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" version
          "$RUNNER_TEMP/gitleaks" detect --source . --log-opts="--all" --redact -v
      - name: trufflehog (full git history, verified secrets)
        run: |
          version=3.95.5
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${version}/trufflehog_${version}_linux_amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP" trufflehog
          "$RUNNER_TEMP/trufflehog" --version
          "$RUNNER_TEMP/trufflehog" git "file://$PWD" --results=verified --fail --no-update
