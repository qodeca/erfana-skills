name: Feature request
description: Suggest a new skill, command, agent, or improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. For larger changes, please open this issue to discuss before sending a pull request — see [CONTRIBUTING.md](https://github.com/qodeca/erfana-skills/blob/main/CONTRIBUTING.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do that the plugin makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? A new skill, a trigger phrase, an option, a behavior change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
